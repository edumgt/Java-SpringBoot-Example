services:
  mysql:
    image: mysql:8.4
    container_name: fooddelivery-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "RootPass!123"
      MYSQL_DATABASE: "fooddelivery"
      MYSQL_USER: "fooduser"
      MYSQL_PASSWORD: "FoodPass!123"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "fooduser", "-pFoodPass!123"]
      interval: 10s
      timeout: 5s
      retries: 20

  mysql-init:
    image: mysql:8.4
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../db-mysql.sql:/scripts/db-mysql.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "mysql -h mysql -u fooduser -pFoodPass!123 fooddelivery < /scripts/db-mysql.sql"
    restart: "no"

volumes:
  mysql_data:
