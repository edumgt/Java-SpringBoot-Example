services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fooddelivery-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 20

  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ../db.sql:/scripts/db.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P $$MSSQL_SA_PASSWORD -i /scripts/db.sql"
    environment:
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    restart: "no"
