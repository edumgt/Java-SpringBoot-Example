services:
  postgresql:
    image: postgres:16
    container_name: fooddelivery-postgresql
    environment:
      POSTGRES_DB: "fooddelivery"
      POSTGRES_USER: "fooduser"
      POSTGRES_PASSWORD: "FoodPass!123"
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ../db-postgresql.sql:/docker-entrypoint-initdb.d/db-postgresql.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fooduser -d fooddelivery"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgresql_data:
