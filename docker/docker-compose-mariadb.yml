services:
  mariadb:
    image: mariadb:11.4
    container_name: fooddelivery-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: "RootPass!123"
      MARIADB_DATABASE: "fooddelivery"
      MARIADB_USER: "fooduser"
      MARIADB_PASSWORD: "FoodPass!123"
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 20

  mariadb-init:
    image: mariadb:11.4
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ../db-mariadb.sql:/scripts/db-mariadb.sql:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "mariadb -h mariadb -u fooduser -pFoodPass!123 fooddelivery < /scripts/db-mariadb.sql"
    restart: "no"

volumes:
  mariadb_data:
