# Test configuration - uses H2 in-memory database
# Overrides the production profile and datasource settings

# Clear any active profile so profile-specific properties (e.g. application-mssql.properties) are not loaded
spring.profiles.active=

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MSSQLServer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop the schema automatically for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
keg.app.jwtSecret=5R+RzG5RCfdj8o19LxXRj6ff432iP5rwqEr4OCBdCckjtQxSII45DgtOXu2yjgKNPx/KE45zdkBXc2qN3GIhhQ==
keg.app.jwtExpirationMs=86400000

# Mail (disabled for tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
